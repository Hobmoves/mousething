<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mouse Gun Arena</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="ui" class="overlay">
    <div class="panel" id="loginPanel">
      <h1>Mouse Gun Arena</h1>
      <p>Move with WASD. Click to shoot.</p>
      <form id="joinForm">
        <input id="nameInput" maxlength="16" placeholder="Pick a name" autocomplete="off" />
        <button type="submit">Enter arena</button>
      </form>
      <p class="small">Your fake cursor replaces the real one in-game.</p>
    </div>

    <div class="panel hidden" id="deadPanel">
      <h1>You got clipped.</h1>
      <p>Rejoin with a new or same name.</p>
      <button id="restartBtn">Back to lobby</button>
    </div>
  </div>

  <canvas id="game"></canvas>

  <div id="hud">
    <div id="stats">
      <span id="myName">—</span>
      <span id="myHealth">100 HP</span>
      <span id="myKills">0 Kills</span>
    </div>
    <div id="hint">WASD to move your cursor, click to fire.</div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/client.js"></script>
</body>
</html>
