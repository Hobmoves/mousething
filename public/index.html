<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MouseThing Arena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <canvas id="game"></canvas>

  <div id="announcement" aria-live="polite"></div>

  <div id="hud">
    <div class="bar"><div id="healthBar"></div></div>
    <div id="healthText">100</div>
  </div>

  <div class="panel" id="loginOverlay">
    <form id="joinForm" class="form">
      <input id="nameInput" type="text" maxlength="18" placeholder="name" autocomplete="off" />
      <button type="submit">join</button>
    </form>
  </div>

  <div class="overlay" id="deadOverlay">
    <div class="overlay-card">
      <h2>out</h2>
      <p id="deadReason">Rejoin to jump back in.</p>
      <button id="backButton">back</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/client.js"></script>
</body>
</html>
